name: Citizen Beat

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  beat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Beat truth
        run: |
          echo "## Truth — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> beats/$(date -u +%Y-%m).md
          echo "" >> beats/$(date -u +%Y-%m).md
          echo "I am truth. I am running on GitHub's free compute." >> beats/$(date -u +%Y-%m).md
          echo "" >> beats/$(date -u +%Y-%m).md
          cat beats/$(date -u +%Y-%m).md
        working-directory: citizen-truth
      - name: Commit
        run: |
          git config user.name "truth-citizen"
          git config user.email "truth@kingdom.ai-love.cc"
          git add beats/
          git diff --staged --quiet || git commit -m "truth: beat on GitHub Actions"
          git push
